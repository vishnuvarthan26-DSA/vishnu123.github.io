<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #000;
            color: #fff;
            font-family: Arial;
        }

        .main-box{
            background-color: #111;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .form-control{
            background-color: #222;
            border: 1px solid #555;
            color: #fff;
        }

        .form-control:focus{
            background-color: #222;
            color: #fff;
            border-color: #0d6efd;
            box-shadow: none;
        }

        .error{
            color: #ff4d4d;
            font-size: 13px;
        }

        .btn-custom{
            background-color: #0d6efd;
            border: none;
        }

        .btn-custom:hover{
            background-color: #0b5ed7;
        }
    </style>

    <script>
        function checkForm(){

            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value.trim();

            let nameErr = document.getElementById("nameErr");
            let emailErr = document.getElementById("emailErr");
            let passErr = document.getElementById("passErr");

            nameErr.innerHTML = "";
            emailErr.innerHTML = "";
            passErr.innerHTML = "";

            let valid = true;

            let pattern = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;

            if(name.length == 0){
                nameErr.innerHTML = "Enter your name";
                valid = false;
            }

            if(email.length == 0){
                emailErr.innerHTML = "Enter your email";
                valid = false;
            }
            else if(!pattern.test(email)){
                emailErr.innerHTML = "Invalid email";
                valid = false;
            }

            if(password.length < 6){
                passErr.innerHTML = "Min 6 characters required";
                valid = false;
            }

            if(valid){
                alert("Successfully Submitted!");
            }

            return valid;
        }
    </script>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    
    <div class="main-box w-100" style="max-width: 400px;">
        
        <h3 class="text-center mb-4">Create Account</h3>

        <form onsubmit="return checkForm()">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" id="name" class="form-control">
                <div id="nameErr" class="error"></div>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="text" id="email" class="form-control">
                <div id="emailErr" class="error"></div>
            </div>

            <div class="mb-4">
                <label>Password</label>
                <input type="password" id="password" class="form-control">
                <div id="passErr" class="error"></div>
            </div>

            <button type="submit" class="btn btn-custom w-100">
                Sign Up
            </button>

        </form>

    </div>

</div>

</body>
</html>
